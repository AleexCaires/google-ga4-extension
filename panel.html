<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header>
    <div class="title">
      <span class="dot" id="live-dot"></span>
      <h1>Conversio DataSpy</h1>
      <span class="count" id="event-count">0</span>
    </div>
    <div class="controls">
      <input type="search" id="filter" placeholder="Filter by event name…" autocomplete="off" />
      <button id="toggle-dl" title="Show dataLayer pushes">DL</button>
      <button id="clear" title="Clear all captured events">Clear</button>
    </div>
    <div class="controls controls--param">
      <input type="search" id="filter-param" placeholder="Filter by parameter value…" autocomplete="off" />
    </div>
  </header>

  <div id="experiences-bar" class="experiences-bar" style="display:none"></div>

  <div id="storage-panel" class="storage-panel">
    <div class="storage-header">
      <span class="storage-title">Conversio Storage</span>
      <button id="storage-refresh" title="Refresh storage">↺</button>
      <button id="storage-clear" title="Clear Conversio storage">Clear</button>
    </div>
    <div id="storage-body" class="storage-body"></div>
    <div id="tools-body" class="storage-row" style="margin-top:6px;flex-wrap:wrap;"></div>
  </div>

  <main id="event-list">
    <div class="empty" id="empty-state">
      <p>No events captured yet.</p>
      <p class="hint">Browse a page that sends GA4 hits and they'll appear here in real time.</p>
    </div>
  </main>

  <template id="event-row-template">
    <details class="event">
      <summary>
        <span class="event-name"></span>
        <span class="event-meta"></span>
      </summary>
      <div class="event-body"></div>
    </details>
  </template>

  <script src="panel.js"></script>
</body>
</html>
